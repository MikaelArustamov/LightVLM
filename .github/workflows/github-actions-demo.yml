name: CI
run-name: ${{ github.actor }} is testing out GitHub Actions 🚀
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install uv and Python
      uses: astral-sh/setup-uv@v5
      with:
        version: "latest"
        enable-cache: true
        python-version: "3.12"

    - name: Install dependencies
      run: uv sync --frozen

    - name: Create .env for CI
      run: |
        cp .env_example .env
        sed -i 's|^TEXT_MODEL=.*|TEXT_MODEL=mock-model|' .env
        sed -i 's|^VISION_MODEL=.*|VISION_MODEL=mock-vision-model|' .env
        sed -i 's|^EMBED_MODEL=.*|EMBED_MODEL=mock-embed-model|' .env

    - name: Run tests (unit only, no model servers)
      run: uv run pytest tests/test_imports.py -v

