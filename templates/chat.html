<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LightVLM</title>
    <link rel="stylesheet" href="/static/style.css">
<style>
:root {
    --bg: #0d0d0d;
    --surface: #141414;
    --surface-hover: #1a1a1a;
    --border: #262626;
    --text: #e5e5e5;
    --text-muted: #737373;
    --accent: #f5f5f5;
    --accent-dim: #a3a3a3;
    --user-bg: #262626;
    --bot-bg: #141414;
    --input-bg: #1a1a1a;
    --radius-sm: 8px;
    --radius-md: 14px;
    --radius-lg: 20px;
    --shadow: 0 0 40px rgba(0,0,0,0.4);
    --recording: #ef4444;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
}

/* Header */
header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    height: 56px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
}

.brand {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: -0.3px;
}

.brand-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #22c55e;
    box-shadow: 0 0 8px #22c55e;
    animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
}

.header-meta {
    font-size: 12px;
    color: var(--text-muted);
    font-weight: 400;
}

/* Chat area */
#chat {
    flex: 1;
    overflow-y: auto;
    padding: 32px 24px;
    max-width: 768px;
    width: 100%;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 24px;
    scroll-behavior: smooth;
}

#chat::-webkit-scrollbar { width: 6px; }
#chat::-webkit-scrollbar-track { background: transparent; }
#chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
#chat::-webkit-scrollbar-thumb:hover { background: #404040; }

/* Messages */
.msg {
    display: flex;
    gap: 14px;
    max-width: 85%;
    animation: slideIn 0.25s ease-out;
}

@keyframes slideIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
}

.msg.user { margin-left: auto; flex-direction: row-reverse; }
.msg.bot { margin-right: auto; }

.avatar {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 600;
}

.msg.user .avatar { background: var(--user-bg); color: var(--text); }
.msg.bot .avatar { background: #171717; color: #a3a3a3; border: 1px solid var(--border); }

.bubble {
    padding: 14px 18px;
    border-radius: var(--radius-md);
    line-height: 1.6;
    font-size: 15px;
    white-space: pre-wrap;
    word-wrap: break-word;
}

.msg.user .bubble {
    background: var(--user-bg);
    border-bottom-right-radius: 4px;
}

.msg.bot .bubble {
    background: var(--bot-bg);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
}

.img-preview {
    max-width: 280px;
    max-height: 200px;
    border-radius: var(--radius-sm);
    margin-top: 10px;
    display: block;
    border: 1px solid var(--border);
}

.msg-meta {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 4px;
    padding: 0 4px;
}

/* Typing indicator */
.typing {
    display: flex;
    gap: 4px;
    padding: 18px;
    align-items: center;
}

.typing-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--text-muted);
    animation: typingBounce 1.4s ease-in-out infinite;
}

.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes typingBounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
}

/* Input area */
#input-area {
    padding: 16px 24px 24px;
    max-width: 768px;
    width: 100%;
    margin: 0 auto;
    flex-shrink: 0;
}

.input-wrapper {
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 14px 16px;
    transition: border-color 0.2s, box-shadow 0.2s;
}

.input-wrapper:focus-within {
    border-color: #404040;
    box-shadow: 0 0 0 3px rgba(255,255,255,0.03);
}

.file-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 10px;
}

#file-in { display: none; }

.file-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    color: var(--text-muted);
    font-size: 13px;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: var(--radius-sm);
    transition: all 0.15s;
    border: none;
    background: none;
}

.file-btn:hover {
    color: var(--text);
    background: var(--surface-hover);
}

#fname {
    font-size: 12px;
    color: var(--text-muted);
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}

.img-thumb {
    width: 48px;
    height: 48px;
    border-radius: var(--radius-sm);
    object-fit: cover;
    border: 1px solid var(--border);
}

.text-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
}

textarea {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--text);
    font-size: 15px;
    line-height: 1.5;
    resize: none;
    min-height: 24px;
    max-height: 200px;
    font-family: inherit;
    outline: none;
}

textarea::placeholder { color: var(--text-muted); }

/* Mic button */
.mic-btn {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: none;
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
}

.mic-btn:hover { color: var(--text); background: var(--surface-hover); }
.mic-btn.recording {
    color: var(--recording);
    background: rgba(239, 68, 68, 0.1);
    animation: pulse 1s infinite;
}

/* TTS button on messages */
.tts-btn {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: none;
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-left: 8px;
    font-size: 12px;
    transition: all 0.15s;
}

.tts-btn:hover { color: var(--text); background: var(--surface-hover); }

/* Send button */
.send-btn {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: none;
    background: var(--accent);
    color: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: all 0.15s;
    font-size: 16px;
}

.send-btn:hover { background: #fff; transform: scale(1.05); }
.send-btn:disabled { background: #404040; color: #737373; cursor: not-allowed; transform: none; }

/* Empty state */
.empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
}

.empty-state h2 {
    font-size: 24px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 8px;
    letter-spacing: -0.5px;
}

.empty-state p {
    font-size: 14px;
    line-height: 1.6;
}

/* Code blocks */
.bubble pre {
    background: #0a0a0a;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px;
    margin: 10px 0;
    overflow-x: auto;
    font-size: 13px;
    font-family: 'SF Mono', Monaco, monospace;
}

.bubble code {
    background: #0a0a0a;
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 13px;
    font-family: 'SF Mono', Monaco, monospace;
}

.bubble pre code { background: none; padding: 0; }

::selection {
    background: rgba(255,255,255,0.15);
    color: #fff;
}
    #voice-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: var(--bg);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 1000;
}

#voice-overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: var(--bg);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 1000;
}
#voice-overlay.active { display: flex; }
.voice-avatar {
    width: 120px; height: 120px;
    border-radius: 50%;
    background: linear-gradient(135deg, #2563eb, #1d4ed8);
    display: flex; align-items: center; justify-content: center;
    font-size: 48px; font-weight: 700; color: white;
    margin-bottom: 32px;
    box-shadow: 0 0 60px rgba(37, 99, 235, 0.3);
}
.voice-status { font-size: 18px; color: var(--text-muted); margin-bottom: 40px; }
.voice-waves { display: flex; gap: 6px; align-items: center; height: 40px; }
.voice-waves span {
    width: 4px; background: var(--accent); border-radius: 2px;
    height: 8px; transition: height 0.2s;
}
.voice-waves.active span { animation: wave 1s ease-in-out infinite; }
.voice-waves span:nth-child(1) { animation-delay: 0s; }
.voice-waves span:nth-child(2) { animation-delay: 0.1s; }
.voice-waves span:nth-child(3) { animation-delay: 0.2s; }
.voice-waves span:nth-child(4) { animation-delay: 0.3s; }
.voice-waves span:nth-child(5) { animation-delay: 0.4s; }
@keyframes wave { 0%,100% { height: 8px; } 50% { height: 32px; } }
.voice-close {
    position: absolute; bottom: 40px;
    width: 56px; height: 56px; border-radius: 50%;
    border: 1px solid var(--border); background: var(--surface);
    color: var(--text); font-size: 20px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
}
.voice-close:hover { background: var(--surface-hover); }
</style>
</head>
<body>
<header>
    <div class="brand">
        <div class="brand-dot"></div>
        LightVLM
    </div>
    <div class="header-meta">local · multimodal · memory · voice</div>
</header>

<div id="chat">
    <div class="empty-state" id="empty">
        <h2>What can I help with?</h2>
        <p>Upload an image, use your voice, or type anything.<br>Your conversation is remembered.</p>
    </div>
</div>

<div id="input-area">
    <div class="input-wrapper">
        <div class="file-row">
            <label class="file-btn" for="file-in">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/>
                </svg>
                Attach
            </label>
            <input type="file" id="file-in" accept=".pdf,.txt,.md,.png,.jpg,.jpeg,.webp,.gif">
            <span id="fname"></span>
            <img id="preview" class="img-thumb" style="display:none">
        </div>
        <div class="text-row">
            <button class="mic-btn" id="mic-btn" title="Click to record, double-click for voice call">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/>
        <path d="M19 10v2a7 7 0 01-14 0v-2"/>
        <line x1="12" y1="19" x2="12" y2="23"/>
        <line x1="8" y1="23" x2="16" y2="23"/>
    </svg>
</button>
            <textarea id="txt" placeholder="Message LightVLM..." rows="1"></textarea>
            <button class="send-btn" id="btn" onclick="send()">↑</button>
        </div>
    </div>
</div>

<script src="/static/app.js"></script>
</body>
</html>
